<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoomBooming</title>

    <link rel="stylesheet" href="./css/common.css"><!-- Common CSS -->
    <link rel="stylesheet" href="./css/main.css"><!-- Main CSS -->

    <style>
        /* ■ 로그인 (2026-07-07 사장님 지시 4번 — mod/4-1.jpg 시안) */
        .login__header_plain {
            height: 56px;
            display: flex;
            align-items: center;
            padding: 0 16px;
        }

        .login__logo_area {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 36px 0 40px;
        }

        .login__logo_img {
            width: 220px;
            height: auto;
        }

        .login__divider_row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .login__divider_line {
            flex: 1;
            height: 1px;
            background-color: var(--color-gray-200);
        }

        .login__divider_text {
            font-size: 14px;
            color: var(--color-text-muted);
        }

        .login__social_btn {
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
            cursor: pointer;
        }

        .login__social_btn_apple {
            background-color: #000000;
            color: #ffffff;
            margin-bottom: 12px;
        }

        .login__social_btn_kakao {
            background-color: #fee500;
            color: #191919;
        }
    </style>
</head>
<body>

<!--
▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨

▩ 로그인

▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨
-->
<div class="app__container app__bg_white app__container_type_basic">
    <header class="header header__bg_red header__type_basic">
        <div class="login__header_plain">
            <button class="btn btn__size_medium" onclick="history.back();">
                <img src="./assets/images/icon_arrow_back_32dp.svg" width="26" height="26">
            </button>
        </div>
    </header>

    <main class="main__container main__container_type_basic">
        <div class="main__content_wrapper">
            <div class="form__body" style="padding-top: 8px;">

                <div class="login__logo_area">
                    <img class="login__logo_img" src="./assets/images/logo_type_kr_red.png" alt="BoomBooming 붐부밍">
                </div>

                <div class="form__group">
                    <input class="form__input" type="email" placeholder="이메일" style="padding-left: 41px; background-image: url('./assets/images/icon_email_20dp_gray.svg'); background-repeat: no-repeat; background-position: 12px center;">
                </div>

                <div class="form__group" style="margin-bottom: 16px;">
                    <input class="form__input" type="password" placeholder="비밀번호" style="padding-left: 41px; background-image: url('./assets/images/icon_lock_20dp_gray.svg'); background-repeat: no-repeat; background-position: 12px center;">
                </div>

                <label style="display: flex; align-items: center; gap: 8px; margin-bottom: 24px; cursor: pointer;">
                    <input type="checkbox" checked style="width: 16px; height: 16px;">
                    <span style="font-size: 14px; color: var(--color-text-dark);">자동 로그인</span>
                </label>

                <button class="form__button" style="background-color: var(--color-primary-pink-dark); margin-bottom: 24px;" onclick="location.href='./home.html';">로그인</button>

                <div class="login__divider_row">
                    <div class="login__divider_line"></div>
                    <span class="login__divider_text">또는</span>
                    <div class="login__divider_line"></div>
                </div>

                <button class="login__social_btn login__social_btn_apple">
                    <img src="./assets/images/icon_logo_apple.svg" width="18" height="18"> Apple로 로그인
                </button>
                <button class="login__social_btn login__social_btn_kakao" style="margin-bottom: 24px;">
                    <img src="./assets/images/icon_logo_kakao_32dp.svg" width="20" height="20"> 카카오 로그인
                </button>

                <a class="form__link_center" href="javascript:void(0);" onclick="document.getElementById('find-menu').style.display='flex';">비밀번호 찾기</a>

                <div id="find-menu" style="display: none; gap: 16px; justify-content: center; margin-top: 12px; font-size: 13px;">
                    <a href="./find_id.html" style="color: var(--color-text-dark);">아이디 찾기</a>
                    <span style="color: var(--color-gray-200);">|</span>
                    <a href="./find_password.html" style="color: var(--color-text-dark);">비밀번호 찾기</a>
                </div>
            </div>
        </div>
    </main>
</div>

</body>
</html>
