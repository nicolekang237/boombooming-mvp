<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>검색 — BoomBooming</title>

    <link rel="stylesheet" href="./css/common.css"><!-- Common CSS -->
    <link rel="stylesheet" href="./css/main.css"><!-- Main CSS -->

    <style>
        /*
        ■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■

        ▩ Search — 검색 페이지

        ▩ 공통으로 쓰이는 레이아웃, 헤더, 푸터 등을 제외하고 오직 이 페이지에서만 쓰이는 스타일은 이곳에만 기재.

        ■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■
        */

        /* ■ 검색창 영역
        ---------------------------------------------------------------------- */
        .search__bar_wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 12px 16px 10px 16px;
            background-color: var(--color-gray-900);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            box-sizing: border-box;
        }

        .search__input_box {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            height: 42px;
            padding: 0 14px;
            border-radius: 100px;
            background-color: rgba(255, 255, 255, 0.09);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .search__input_box input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-size: 15px;
            color: var(--color-text-primary);
        }

        .search__input_box input::placeholder {
            color: #777;
        }

        /* ■ 탭 영역
        ---------------------------------------------------------------------- */
        .tabs__switcher {
            display: flex;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        }

        .tabs__item {
            flex: 1;
            padding: 12px 0;
            text-align: center;
            font-size: 14px;
            color: #777;
            cursor: pointer;
        }

        .tabs__item_active {
            font-weight: 700;
            color: var(--color-primary-pink);
            border-bottom: 2px solid var(--color-primary-pink);
            margin-bottom: -1px;
        }

        /* ■ 섹션 제목
        ---------------------------------------------------------------------- */
        .section__label {
            padding: 20px 16px 10px 16px;
            font-size: 13px;
            font-weight: 700;
            color: #888;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        /* ■ 최근 검색어
        ---------------------------------------------------------------------- */
        .recent__list {
            padding: 0 16px;
        }

        .recent__item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            cursor: pointer;
        }

        .recent__item_left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .recent__keyword {
            font-size: 15px;
            color: #dddddd;
        }

        /* ■ 인기 검색어
        ---------------------------------------------------------------------- */
        .trending__list {
            padding: 0 16px;
        }

        .trending__item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            cursor: pointer;
        }

        .trending__rank {
            width: 20px;
            font-size: 16px;
            font-weight: 900;
            color: var(--color-primary-pink);
            text-align: center;
            flex-shrink: 0;
        }

        .trending__rank_normal {
            color: #555;
        }

        .trending__info {
            flex: 1;
        }

        .trending__keyword {
            font-size: 15px;
            color: var(--color-text-primary);
        }

        .trending__meta {
            font-size: 12px;
            color: #666;
            margin-top: 2px;
        }

        .trending__badge {
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .badge__up {
            background-color: rgba(255, 80, 80, 0.15);
            color: var(--color-error);
        }

        .badge__new {
            background-color: rgba(80, 200, 140, 0.15);
            color: #50c88c;
        }

        /* ■ 추천 인물 카드
        ---------------------------------------------------------------------- */
        .suggest__row {
            display: flex;
            gap: 12px;
            padding: 8px 16px 16px 16px;
            overflow-x: auto;
        }

        .suggest__row::-webkit-scrollbar {
            display: none;
        }

        .suggest__card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            width: 76px;
            cursor: pointer;
        }

        .suggest__avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid rgba(255, 140, 157, 0.5);
        }

        .suggest__avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .suggest__name {
            font-size: 12px;
            color: #cccccc;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        /* ■ 검색 결과 영역 (숨김 상태로 시작)
        ---------------------------------------------------------------------- */
        .search__result {
            display: none;
            padding: 0 16px;
        }

        .result__item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            cursor: pointer;
        }

        .result__avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            cursor: pointer;
        }

        .result__btn.is_requested {
            border-color: rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.5);
        }

        .result__avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .result__info {
            flex: 1;
            overflow: hidden;
        }

        .result__name {
            font-size: 15px;
            font-weight: 600;
            color: var(--color-text-primary);
        }

        .result__desc {
            font-size: 13px;
            color: #888;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .result__btn {
            flex-shrink: 0;
            padding: 6px 14px;
            border-radius: 100px;
            border: 1px solid rgba(255, 140, 157, 0.6);
            font-size: 13px;
            font-weight: 600;
            color: var(--color-primary-pink);
            background: transparent;
            cursor: pointer;
        }
    </style>
</head>
<body>

</div>

<!-- ■□■□■ [SCRIPT] -->
<script>
    var tabs = ['all', 'people', 'video', 'tag'];

    function switchTab(active) {
        tabs.forEach(function(t) {
            var el = document.getElementById('tab-' + t);
            if (t === active) {
                el.classList.add('tabs__item_active');
            } else {
                el.classList.remove('tabs__item_active');
            }
        });
    }

    function handleSearchInput(val) {
        var clearBtn = document.getElementById('clearBtn');
        var defaultView = document.getElementById('defaultView');
        var resultView = document.getElementById('resultView');

        if (val.length > 0) {
            clearBtn.style.display = 'block';
            defaultView.style.display = 'none';
            resultView.style.display = 'block';
        } else {
            clearBtn.style.display = 'none';
            defaultView.style.display = 'block';
            resultView.style.display = 'none';
        }
    }

    function clearSearch() {
        var input = document.getElementById('searchInput');
        input.value = '';
        handleSearchInput('');
        input.focus();
    }

    function fillSearch(keyword) {
        var input = document.getElementById('searchInput');
        input.value = keyword;
        handleSearchInput(keyword);
        input.focus();
    }

    // 인맥 신청 버튼 토글 (profile.html의 인맥 신청 버튼과 동일한 패턴)
    function toggleConnectBtn(btn) {
        if (btn.classList.contains('is_requested')) {
            btn.classList.remove('is_requested');
            btn.textContent = '인맥';
        } else {
            btn.classList.add('is_requested');
            btn.textContent = '신청됨';
        }
    }
</script>

</body>
