<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoomBooming</title>

    <style>
        /*
        ■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■

        ▩ 뉴스피드 이외의 장소에서 독립적으로 동영상을 띄울 때 사용되는 페이지.

        ▩ 공통으로 쓰이는 레이아웃, 헤더, 푸터 등을 제외하고 오직 이 페이지에서만 쓰이는 스타일은 이곳에만 기재.

        ■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■
        */

        /* ■ Normalize - PD1000 style
        ---------------------------------------------------------------------- */
        html{width:100%;height:100%;margin:0;padding:0;font-size:14px;font-weight:400;font-family:Arial, sans-serif;text-size-adjust:none;word-break: keep-all;}
        div, span, button, textarea, input, dl ,dt, dd, ul ,ol, li, h1, h2, h3, h4, h5, form, fieldset, p, img, iframe, table, tbody, tfoot, thead, tr, th, td, a{margin:0;padding:0;border:0;box-sizing:border-box;white-space:normal;}
        body{width:100%;height:100%;margin:0;padding:0;background-color: #333c4d;}
        li{list-style:none;}
        input, select, button, textarea, optgroup{margin:0;outline:none;font:inherit;color:inherit;text-decoration:none;}
        textarea{resize:none;}
        button{padding-bottom:1px;text-align:center;cursor:pointer;background:transparent;}
        button, span, a{display:inline-block;vertical-align:top;}
        a{cursor:pointer;}
        a:link, a:visited, a:hover, a:focus, a:active{color:inherit;text-decoration:none;outline:none;}
        img{border:0;}


        /* ■ Web fonts basic - 페이지 구성에 반드시 필요한 기본 폰트
        ---------------------------------------------------------------------- */
        /* NEXON Lv1 Gothic */
        @font-face {
            font-family: 'NEXONLv1Gothic';
            src: url('https://boombooming.netlify.app/assets/fonts/NEXONLv1Gothic-100.woff2') format('woff2'),
            font-weight: 100;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'NEXONLv1Gothic';
            src: url('https://boombooming.netlify.app/assets/fonts/NEXONLv1Gothic-400.woff2') format('woff2'),
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'NEXONLv1Gothic';
            src: url('https://boombooming.netlify.app/assets/fonts/NEXONLv1Gothic-700.woff2') format('woff2'),
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }


        /* ■ Main Layout
        ---------------------------------------------------------------------- */
        /* All */
        .app__container {
            display: flex;
            flex-direction: column;
            position: relative;
            width: 100%;
            min-width: 320px;
            height: 100vh;
            margin: 0 auto;
            font-family: 'NEXONLv1Gothic';
            font-weight: 400;
            line-height: 1;
            color: var(--color-text-primary);
            background-size: cover;
            overflow: hidden;
        }

        .app__container_type_basic {
            /* */
        }

        .app__container_type_newsfeed {
            /* */
        }

        .app__bg_dark {
            background-image: url(https://boombooming.netlify.app/assets/images/bg_main_dark.png);
            background-size: 430px;
        }

        .app__bg_chat {
            background-image: url(https://boombooming.netlify.app/assets/images/bg_main_chat.png);
            background-size: 430px;
            background-position: center bottom;
        }

        .app__bg_chatroom {
            background-image: url(https://boombooming.netlify.app/assets/images/bg_main_chatroom.png);
            background-size: 430px;
            background-position: center bottom;
        }


        /* Header */
        .header {
            position: relative;
            width: 100%;
            background-position: center top;
            background-repeat: repeat-x;
            background-size: cover;
            flex-shrink: 0;
            z-index: 1;

            padding-top: 50px;
        }


        /* Footer */
        .footer {
            position: relative;
            width: 100%;
            flex-shrink: 0;
            z-index: 1;
        }

        .header__type_newsfeed {
            position: absolute;
            top: 0;
            left: 0;
        }

        .footer__type_basic {
            border-top: 1px solid #444444;
            box-shadow: 0 -10px 20px rgba(0, 0, 0, 0.7);
            background-color: #000000;
        }

        .footer__type_newsfeed {
            position: absolute;
            bottom: 0;
            left: 0;
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 -1px 0 0 rgba(0, 0, 0, 1);
            backdrop-filter: blur(6px); /* 이 아래에 있는 이미지나 동영상이 Blur 되어 보임 */
        }


        /* Top Bar */
        .header__bg_transparent {
            background-color: rgba(0, 0, 0, 0.6);
        }

        .header__bg_red { /* 베경 패턴 이미지 - Red */
            background-image: url(https://boombooming.netlify.app/assets/images/bg_top_banner_red.png);
            background-size: 430px;
        }

        .header__bg_purple { /* 베경 패턴 이미지 - Purple */
            background-image: url(https://boombooming.netlify.app/assets/images/bg_top_banner_purple.png);
            background-size: 430px;
        }

        .header__bg_green { /* 베경 패턴 이미지 - Purple */
            background-image: url(https://boombooming.netlify.app/assets/images/bg_top_banner_green.png);
            background-size: 430px;
        }


        /* Main Container */
        .main__container {
            position: relative;
            width: 100%;
            flex: 1; /* 남은 공간을 모두 차지 */
        }

        .main__container_type_basic {
            overflow-y: scroll;
        }

        .main__container_type_newsfeed {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
        }

        .main__container_type_basic .main__content_wrapper {
            width: 100%;
            min-height: 100%;
        }

        .main__container_type_chatroom .main__content_wrapper {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }


        /* Tool Bar */
        .toolbar {
            display: flex;
            justify-content: space-around;
            width: 100%;
            height: 60px;
            padding: 6px 0;
        }

        .btnbox__toolbar {
            position: relative;
            width: 60px;
            height: 42px;
        }

        .btnbox__badge {
            position: absolute;
            top: -8px;
            right: -2px;
            width: auto;
            padding: 2px 6px 3px 6px;
            border-radius: 10px;
            border: 1px solid var(--color-success);
            font-size: 12px;
            background-color: var(--color-success-dark);
        }


        /* ■ Content
        ---------------------------------------------------------------------- */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            height: 50px;
            padding: 0 10px;
        }

        .topbar .btn {
            flex-shrink: 0;
        }

        .iconbox__topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 4px;
            min-width: 42px;
            height: 100%;
        }


        /* ■ Card
        ---------------------------------------------------------------------- */
        .card__container {
            position: relative;
            width: 100%;
            height: 100%;
            scroll-snap-align: start;
        }

        .panel__gradient { /* 텍스트 가독성을 위한 그래디언트 배경 */
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
        }

        .gradient__type_a {
            height: 220px;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0.5) 40%, rgba(0, 0, 0, 0.8) 75%, rgba(0, 0, 0, 0.8) 100%);
        }

        .gradient__type_b {
            height: 160px;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0.1) 20%, rgba(0, 0, 0, 0.4) 50%, rgba(0, 0, 0, 0.6) 68%, rgba(0, 0, 0, 0.6) 100%);
        }

        .card__option_wrapper { /* 상위 부모 */
            position: absolute;
            top: 100px;
            bottom: 80px;
            right: 10px;
        }

        .card__option_inner { /* 아이템을 싸고 있는 부모 Container */
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end; /* 아이템들을 가로 중앙에 정렬 (선택 사항) */
            flex-wrap: wrap-reverse;
            gap: 6px;
            height: 100%;
            max-width: 50px; /* 아이템의 너비에 맞게 조정 (선택 사항) */
        }

        .btnbox__card_option { /* Items */
            flex-shrink: 0;
            width: 50px; /* 아이템의 너비를 고정 */
            height: 62px; /* 아이템의 높이를 고정 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }

        .card__option--text {
            font-size: 13px;
            text-shadow: 1px 0 1px #000000, 0 1px 1px #000000, -1px 0 1px #000000, 0 -1px 1px #000000;
        }

        .card__user_wrapper {
            position: absolute;
            bottom: 80px;
            left: 16px;
            right: 70px;
            overflow: hidden;
        }

        .user__wrapper_description {
            margin-top: 14px;
            white-space: nowrap;
        }

        .user__wrapper_views { /* 동영상 조회수 표시 영역 */
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 10px;
        }

        .views__iconbox {
            display: flex;
            align-items: center;
            margin-top: 1.5px;
        }


        @media (max-height: 767px) and (orientation: landscape) {
            .card__option_inner {
                flex-direction: row; /* 아이템들을 가로로 정렬 */
                justify-content: flex-end; /* 오른쪽 끝에 정렬 */
                align-items: center; /* 세로 중앙 정렬 (선택 사항) */
                flex-wrap: wrap; /* 필요 시 줄바꿈 */
                height: auto;
                bottom: 80px;
                right: 10px;
            }

            .card__option_inner { /* 아이템을 싸고 있는 부모 Container */
                display: flex;
                flex-direction: column;
                justify-content: flex-end;
                align-items: flex-end; /* 아이템들을 가로 중앙에 정렬 (선택 사항) */
                flex-wrap: wrap-reverse;
                gap: 6px;
                height: 100%;
                max-width: 50px; /* 아이템의 너비에 맞게 조정 (선택 사항) */
            }

            .btnbox__card_option {
                display: inline-flex;
                margin: 0 8px;
            }
        }


        /* ■ Components
        ---------------------------------------------------------------------- */
        /* Common */
        .title__main {
            font-size: 16px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            flex: 1;
        }

        .title__main_name {
            font-weight: 700;
        }

        .title__main_text {
            white-space: nowrap;
            opacity: 0.8;
        }

        .logo__main {
            width: 46px;
            object-fit: contain;
            flex-shrink: 0;
        }


        /* Avatar */
        .avatar {
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
        }

        .avatar__column {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .avatar__row {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .avatar__name {
            line-height: 1.3;
            overflow: hidden;
        }

        .avatar__name_sub {
            font-size: 13px;
            opacity: 0.7;
        }

        .avatar__column .avatar__name {
            max-height: 50px; /* 이름이 3줄까지 보임 */
            font-size: 13px;
            text-align: center;
        }

        .avatar__row .avatar__name {
            max-height: 36px; /* 이름이 2줄까지 보임 */
            font-size: 14px;
            white-space: nowrap;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar__size_max {
            position: absolute;
            bottom: -63px;
            left: 30px;
            width: 126px;
            height: 126px;
            border: 2px solid var(--color-text-primary);
        }

        .avatar__size_big {
            width: 70px;
            height: 70px;
            border: 2px solid #999999;
        }

        .avatar__size_medium {
            width: 54px;
            height: 54px;
            border: 2px solid #999999;
        }

        .avatar__size_small {
            width: 38px;
            height: 38px;
            border: 2px solid #999999;
        }

        .avatar__size_tiny {
            width: 32px;
            height: 32px;
            border: 2px solid #999999;
        }


        /* Button */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn__full {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: 100%;
        }

        .btn__circle {
            border-radius: 50%;
            background-color: rgba(0, 0, 0, 0.7);
        }

        .btn__size_medium {
            width: 42px;
            min-height: 42px;
        }

        .btn__size_small {
            width: 34px;
            min-height: 34px;
        }

        .btn__text {
            width: 100%;
            font-size: 11px;
            text-align: center;
            opacity: 0.7;
        }


        /* Ratings */
        .ratings__container {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .ratings__stars {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .ratings__score {
            font-size: 16px;
        }

        .btnbox__play_video {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 26%;
            max-width: 100px;
            aspect-ratio: 1 / 1;
        }


        /* Video */
        .main__video_wrapper {
            width: 100%;
            height: 100vh;
            object-fit: cover;
        }

        .btnbox__play_video button {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid #ffffff;
            box-shadow: 0 6px 10px rgba(0, 0, 0, 0.5);
            background-size: cover;
            overflow: hidden;
        }


        /* ■ Status
        ---------------------------------------------------------------------- */
        .scroll__x {
            overflow-y: hidden;
            overflow-x: scroll;
        }

    </style>
</head>
<body>

<!--
▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨

▩ My Suite

▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨
-->
<div class="app__container app__bg_dark app__container_type_newsfeed">
    <!--
    ■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■

    ▨ Header - 상단바 영역.(고정 영역)
    ▨ 인클루드를 위해 별도의 파일로 만들어서 Import시켜야 하는 하는 영역.
    ▨ 단, 내부의 버튼이나 구성 등이 페이지마다 다름.

    ■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■
    -->
    <header class="header header__bg_transparent header__type_newsfeed">
        <div class="topbar">

            <!-- ▨ NOTE - 여기서부터의 내용은 페이지마다 다를 수 있음 -->
            <button class="btn btn__size_medium" onclick="history.back();">
                <img src="https://boombooming.netlify.app/assets/images/icon_arrow_back_32dp_bold.svg" width="32" height="32">
            </button>

            <div class="title__main">
            </div>

            <div class="iconbox__topbar">
                <button class="btn btn__size_medium">
                    <img src="https://boombooming.netlify.app/assets/images/icon_search_32dp.svg" width="26" height="26">
                </button>

                <button class="btn btn__size_medium">
                    <img src="https://boombooming.netlify.app/assets/images/icon_refresh_32dp.svg" width="26" height="26">
                </button>

                <button class="btn btn__size_medium">
                    <img src="https://boombooming.netlify.app/assets/images/icon_notifications_32dp.svg" width="24" height="24">
                </button>

                <button class="btn btn__size_medium">
                    <img src="https://boombooming.netlify.app/assets/images/icon_rate_review_32dp.svg" width="22" height="22">
                </button>
            </div>

        </div>        
    </header>

    <!--
    ■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■

    ▨ Body - 메인 컨텐츠 영역(게시물 영역)

    ■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■
    -->
    <main class="main__container main__container_type_newsfeed">

        <!-- ▨ NOTE - Header, Footer를 제외하고 게시물 영역만 떼어내려면 이곳을 떼어냄 -->

        <div class="main__content_wrapper" style="height: 100%;overflow: hidden;">

            <!-- ▨ NOTE - <video> 태그를 포함한 카드 | <video> 태그 안에 'autoplay'와 'loop' 적용됨. 음소거로 시작하려면 'muted' 적용. -->
            <div class="card__container">
                <video class="main__video_wrapper" muted autoplay loop poster="썸네일_이미지_주소.jpg">
                    <source src="https://boombooming.netlify.app/assets/data/sample_vod_3.mp4" type="video/mp4">
                    죄송합니다. 귀하의 브라우저는 비디오 태그를 지원하지 않습니다.
                </video>

                <div class="panel__gradient gradient__type_a"></div><!-- 텍스트 가독성을 위한 그래디언트 배경 -->

                <div class="btnbox__play_video">
                    <button style="background-image: url(https://boombooming.netlify.app/assets/images/bg_play_button.png);"></button>
                </div>

                <div class="card__user_wrapper">
                    <div class="user__wrapper_avatar avatar__row">
                        <div class="avatar avatar__size_small">
                            <img src="https://boombooming.netlify.app/assets/images/sample_avatar_1.png">
                        </div>
                        
                        <div class="avatar__name">
                            Whitney Johns
                            <div class="avatar__name_sub">Influencer, Google</div>
                        </div>
                    </div>

                    <div class="user__wrapper_description">
                        패션 모델 인터뷰용 화보 모음
                    </div>

                    <div class="user__wrapper_views">
                        <div class="views__iconbox">
                            <img src="https://boombooming.netlify.app/assets/images/icon_visibility_32dp.svg" width="16" height="16">
                        </div>

                        <div class="views__count">6225</div>
                    </div>
                </div>

                <div class="card__option_wrapper">
                    <div class="card__option_inner">
                        <div class="btnbox__card_option">
                            <button class="btn btn__circle btn__size_medium">
                                <img src="https://boombooming.netlify.app/assets/images/icon_favorite_32dp.svg" width="24" height="24" style="margin-top: 2px;">
                            </button>

                            <div class="card__option--text">128</div>
                        </div>

                        <div class="btnbox__card_option">
                            <button class="btn btn__circle btn__size_medium" style="background-color: var(--color-primary-pink-active);">
                                <img src="https://boombooming.netlify.app/assets/images/icon_favorite_32dp_fill.svg" width="24" height="24" style="margin-top: 2px;">
                            </button>

                            <div class="card__option--text">128</div>
                        </div>

                        <div class="btnbox__card_option">
                            <button class="btn btn__circle btn__size_medium">
                                <img src="https://boombooming.netlify.app/assets/images/icon_chat_32dp.svg" width="22" height="22">
                            </button>

                            <div class="card__option--text">6</div>
                        </div>

                        <div class="btnbox__card_option">
                            <button class="btn btn__circle btn__size_medium">
                                <img src="https://boombooming.netlify.app/assets/images/icon_ratings_32dp_white.svg" width="20" height="20">
                            </button>

                            <div class="card__option--text">부밍지수</div>
                        </div>
