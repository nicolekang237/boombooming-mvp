<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연결된 소셜 계정 - BoomBooming</title>

    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/main.css">

    <style>
        .ca__list {
            padding: 8px 16px;
        }

        .ca__item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 4px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .ca__icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .ca__info {
            flex: 1;
        }

        .ca__name {
            font-size: 14px;
            font-weight: 700;
            color: #ffffff;
        }

        .ca__status {
            font-size: 12px;
            margin-top: 2px;
        }

        .ca__status.is_connected {
            color: var(--color-success);
        }

        .ca__status.is_disconnected {
            color: rgba(255, 255, 255, 0.4);
        }

        .ca__btn {
            flex-shrink: 0;
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 12.5px;
            font-weight: 700;
            cursor: pointer;
        }

        .ca__btn.is_connect {
            background: var(--color-primary-pink-active);
            color: #fff;
            border: none;
        }

        .ca__btn.is_disconnect {
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .ca__notice {
            padding: 16px 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.35);
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="app__container app__bg_dark app__container_type_basic">
    <header class="header header__bg_red header__type_basic">
        <div class="topbar">
            <button class="btn btn__size_medium" onclick="history.back();">
                <img src="./assets/images/icon_arrow_back_32dp.svg" width="32" height="32">
            </button>
            <div class="title__main"><span class="title__main_name">연결된 소셜 계정</span></div>
            <div class="iconbox__topbar" style="visibility:hidden;"><button class="btn btn__size_medium"></button></div>
        </div>
    </header>

    <main class="main__container main__container_type_basic">
        <div class="ca__list">

            <div class="ca__item">
                <div class="ca__icon" style="background:#000;">
                    <img src="./assets/images/icon_logo_apple.svg" width="18" height="18">
                </div>
                <div class="ca__info">
                    <div class="ca__name">Apple</div>
                    <div class="ca__status is_disconnected" id="appleStatus">연결 안 됨</div>
                </div>
                <button class="ca__btn is_connect" id="appleBtn" onclick="toggleAccount('apple');">연결하기</button>
            </div>

            <div class="ca__item">
                <div class="ca__icon" style="background:#fee500;">
                    <img src="./assets/images/icon_logo_kakao_32dp.svg" width="20" height="20">
                </div>
                <div class="ca__info">
                    <div class="ca__name">카카오</div>
                    <div class="ca__status is_connected" id="kakaoStatus">연결됨 · user@kakao.com</div>
                </div>
                <button class="ca__btn is_disconnect" id="kakaoBtn" onclick="toggleAccount('kakao');">연결 해제</button>
            </div>

        </div>

        <div class="ca__notice">소셜 계정을 연결하면 다음 로그인부터 해당 계정으로 간편하게 로그인할 수 있어요. 연결을 해제해도 기존 가입 정보는 유지됩니다.</div>
    </main>
</div>

<script>
    var accountState = { apple: false, kakao: true };

    function toggleAccount(provider) {
        var isConnected = accountState[provider];

        if (isConnected) {
            if (!confirm((provider === 'apple' ? 'Apple' : '카카오') + ' 계정 연결을 해제하시겠어요?')) return;
            accountState[provider] = false;
        } else {
            alert((provider === 'apple' ? 'Apple' : '카카오') + ' 계정이 연결되었습니다.');
            accountState[provider] = true;
        }

        render(provider);
    }

    function render(provider) {
        var statusEl = document.getElementById(provider + 'Status');
        var btnEl = document.getElementById(provider + 'Btn');
        var connected = accountState[provider];

        if (connected) {
            statusEl.textContent = provider === 'apple' ? '연결됨' : '연결됨 · user@kakao.com';
            statusEl.className = 'ca__status is_connected';
            btnEl.textContent = '연결 해제';
            btnEl.className = 'ca__btn is_disconnect';
        } else {
            statusEl.textContent = '연결 안 됨';
            statusEl.className = 'ca__status is_disconnected';
            btnEl.textContent = '연결하기';
            btnEl.className = 'ca__btn is_connect';
        }
    }
</script>

</body>
</html>
