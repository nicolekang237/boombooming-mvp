<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoomBooming - Splash</title>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Pretendard', sans-serif;
            overflow: hidden;
        }

        .splash__container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeInOut 2.5s forwards;
        }

        .splash__logo {
            width: 180px;
            margin-bottom: 24px;
        }

        .splash__spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(255, 140, 157, 0.2);
            border-top-color: var(--color-primary-pink);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: scale(0.95); }
            20% { opacity: 1; transform: scale(1); }
            80% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.05); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="splash__container">
        <img src="./assets/images/logo_horz_white.png" alt="BoomBooming Logo" class="splash__logo">
        <div class="splash__spinner"></div>
    </div>

    <script>
        // 2.5초 후 웰컴 페이지로 이동
        setTimeout(() => {
            location.href = './welcome.html';
        }, 2500);
    </script>

</body>
</html>
