<!DOCTYPE html>

    <link rel="stylesheet" href="./css/main.css"><!-- Main CSS -->

    <style>
        /*
        ■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■

        ▩ 채팅방

        ▩ 공통으로 쓰이는 레이아웃, 헤더, 푸터 등을 제외하고 오직 이 페이지에서만 쓰이는 스타일은 이곳에만 기재.

        /* ■ 메인 컨텐츠 영역
        ---------------------------------------------------------------------- */
        .chat__user_container {

            background-color: rgba(0, 0, 0, 0.2);
        }

        .chat__content_title {
            width: 100%;
            margin-bottom: 14px;
            font-size: 16px;
            font-weight: 700;
            line-height: 1;
        }

        .chat__content_main {
            width: 100%;
        }

        .chat__content_type_grid_b { /* 가로 리스트 = 가로 스크롤 (2026-07-07 지시 5번) */
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scrollbar-width: none;
            min-height: 94px; /* chat_first_match.html의 새 인맥들 줄과 동일한 높이 기준 */
        }
        .chat__content_type_grid_b::-webkit-scrollbar { display: none; }
        .chat__content_type_grid_b .main__content_avatar { flex-shrink: 0; width: 70px; }


        .chat__list_container {
            padding: 24px 14px 20px 20px;
        }

        .chat__room_list {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 20px;
        }

        .chat__list_avatar {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .avatar__chat_titlebox {
            line-height: 1.4;
        }

        .avatar__chat_name {
            font-size: 15px;
            font-weight: 700;
            color: var(--color-accent-gold);
        }

        .avatar__chat_description {
            margin-top: 4px;
        }

        
        .chat__list_option {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            flex-shrink: 0;
        }

        .chat__list_date {
            margin-top: 5px;
            font-size: 12px;
            opacity: 0.7;
        }

<!-- ■□■□■ [SCRIPT] 'Javascript' Area -->
<script>
    // 홈에서 상호 인맥연결된 유저를 대화 목록 최상단에 추가합니다.
    // (데모: 홈 화면 스와이프 매칭 결과를 localStorage 'bbm_connections'로 공유)
    (function () {
        var connections;
        try { connections = JSON.parse(localStorage.getItem('bbm_connections') || '[]'); } catch (e) { connections = []; }
        if (!connections.length) return;

        var grid = document.querySelector('.chat__content_type_grid_b');
        var list = document.querySelector('.chat__list_container .chat__content_main');

        // 최신 연결이 맨 앞에 오도록 역순으로 삽입
        connections.slice().reverse().forEach(function (user) {
            // '새로운 대화 시작하기' 아바타 줄 맨 앞에 추가
            if (grid) {
                var col = document.createElement('div');
                col.className = 'main__content_avatar avatar__column';
                col.style.cursor = 'pointer';
                col.innerHTML =
                    '<div class="avatar avatar__size_medium"><img src="' + user.avatar + '"></div>' +
                    '<div class="avatar__name">' + user.name + '</div>';
                col.onclick = function () { location.href = './chatroom.html'; };
                grid.insertBefore(col, grid.firstChild);
            }

            // '최근 대화' 목록 최상단에 추가
            if (list) {
                var row = document.createElement('div');
                row.className = 'chat__room_list';
                row.innerHTML =
                    '<div class="chat__list_avatar">' +
                        '<div class="avatar avatar__size_medium"><img src="' + user.avatar + '"></div>' +
                        '<div class="avatar__chat_titlebox">' +
                            '<div class="avatar__chat_name">' + user.name + '</div>' +
                            '<div class="avatar__chat_description">새로 연결된 인맥이에요. 인사를 나눠보세요!</div>' +
                        '</div>' +
                    '</div>' +
                    '<div class="chat__list_option"><div class="chat__list_date">방금</div></div>';
                row.querySelector('.chat__list_avatar').style.cursor = 'pointer';
                row.querySelector('.chat__list_avatar').onclick = function () { location.href = './chatroom.html'; };
                list.insertBefore(row, list.firstChild);
            }
        });
    })();
</script>
