<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이메일 변경 - BoomBooming</title>

    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/main.css">

    <style>
        .ce__current_box {
            padding: 14px 16px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 24px;
        }

        .ce__current_label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 4px;
        }

        .ce__current_value {
            font-size: 14px;
            font-weight: 700;
            color: #ffffff;
        }

        .ce__form_label {
            font-size: 13px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 8px;
        }

        .ce__input_row {
            display: flex;
            gap: 8px;
            margin-bottom: 6px;
        }

        .ce__input {
            flex: 1;
            padding: 13px 14px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #eee;
            font-size: 14px;
            box-sizing: border-box;
        }

        .ce__send_btn {
            flex-shrink: 0;
            padding: 0 16px;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }

        .ce__error {
            display: none;
            color: var(--color-error);
            font-size: 12px;
            margin-bottom: 16px;
        }

        .ce__code_group {
            display: none;
            margin-top: 18px;
        }

        .ce__submit_btn {
            width: 100%;
            margin-top: 28px;
            padding: 15px;
            border-radius: 100px;
            border: none;
            background: var(--color-primary-pink-active);
            color: #fff;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
        }

        .ce__submit_btn:disabled {
            background: #555;
            color: rgba(255, 255, 255, 0.5);
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="app__container app__bg_dark app__container_type_basic">
    <header class="header header__bg_red header__type_basic">
        <div class="topbar">
            <button class="btn btn__size_medium" onclick="history.back();">
                <img src="./assets/images/icon_arrow_back_32dp.svg" width="32" height="32">
            </button>
            <div class="title__main"><span class="title__main_name">이메일 변경</span></div>
            <div class="iconbox__topbar" style="visibility:hidden;"><button class="btn btn__size_medium"></button></div>
        </div>
    </header>

    <main class="main__container main__container_type_basic">
        <div class="main__content_wrapper" style="padding: 20px 16px;">

            <div class="ce__current_box">
                <div class="ce__current_label">현재 이메일</div>
                <div class="ce__current_value">user@example.com</div>
            </div>

            <div class="ce__form_label">새 이메일</div>
            <div class="ce__input_row">
                <input class="ce__input" type="email" id="newEmailInput" placeholder="새 이메일을 입력하세요">
                <button class="ce__send_btn" id="ceSendBtn" onclick="sendEmailCode();">인증코드 발송</button>
            </div>
            <div class="ce__error" id="ceEmailError">올바른 이메일 형식을 입력해주세요.</div>

            <div class="ce__code_group" id="ceCodeGroup">
                <div class="ce__form_label">인증코드</div>
                <input class="ce__input" type="text" id="ceCodeInput" placeholder="6자리 코드 입력" maxlength="6" oninput="updateCeSubmitBtn();" style="width:100%; box-sizing:border-box;">
                <div class="ce__error" id="ceCodeError"></div>
            </div>

            <button class="ce__submit_btn" id="ceSubmitBtn" disabled onclick="submitEmailChange();">변경 완료</button>
        </div>
    </main>
</div>

<script>
    var CE_DEMO_CODE = '123456';
    var ceCodeSent = false;

    function sendEmailCode() {
        var email = document.getElementById('newEmailInput').value.trim();
        var emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        var errorEl = document.getElementById('ceEmailError');

        if (!emailPattern.test(email)) {
            errorEl.style.display = 'block';
            return;
        }
        errorEl.style.display = 'none';

        ceCodeSent = true;
        document.getElementById('ceCodeGroup').style.display = 'block';
        document.getElementById('ceSendBtn').textContent = '재발송';
        alert('인증코드가 발송되었습니다.\n(데모 환경 안내: 인증번호 ' + CE_DEMO_CODE + ')');
        updateCeSubmitBtn();
    }

    function updateCeSubmitBtn() {
        var code = document.getElementById('ceCodeInput').value;
        document.getElementById('ceSubmitBtn').disabled = !(ceCodeSent && code.length === 6);
    }

    function submitEmailChange() {
        var code = document.getElementById('ceCodeInput').value;
        var errorEl = document.getElementById('ceCodeError');
        if (code !== CE_DEMO_CODE) {
            errorEl.textContent = '인증코드가 일치하지 않습니다.';
            errorEl.style.display = 'block';
            return;
        }
        alert('이메일이 변경되었습니다.');
        history.back();
    }
</script>

</body>
</html>
