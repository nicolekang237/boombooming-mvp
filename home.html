<script>
    // 첫 진입 시 5번째 카드(동영상 재생 카드 - 좋아요/댓글/보관 등 옵션 버튼 포함)가 바로 보이도록 스크롤 위치를 설정.
    // 카드 순서가 바뀌면 인덱스(4)를 함께 수정할 것.
    window.addEventListener('DOMContentLoaded', function () {
        var main = document.querySelector('.main__container_type_newsfeed');
        var cards = main ? main.querySelectorAll('.card__container') : [];
        if (cards.length >= 5) {
            main.scrollTop = cards[4].offsetTop;
        }
    });
</script>


<!-- Tinder Swipe Styles & Scripts -->
<style>
    /* 기존 뉴스피드 컨테이너의 스크롤을 막고 겹침 레이아웃(Stack)으로 강제 변환 */
    .main__container_type_newsfeed {
        position: relative !important;
        overflow: hidden !important;
        display: block !important;
        height: 100vh !important; /* 헤더 영역을 고려해서 조금 수정 필요할 수도 있음 */
    }

    .main__container_type_newsfeed .card__container {
        position: absolute !important;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        transform-origin: 50% 100%;
        will-change: transform, opacity;
        transition: transform 0.3s ease-out, opacity 0.3s ease-out;
        background-color: #000; /* 뒤 배경색 */
    }

    .main__container_type_newsfeed .card__container.moving {
        transition: none; /* 드래그 중엔 트랜지션 해제 */
    }
    
    /* 카드보다 헤더와 푸터가 위로 올라오도록 강제 처리 */
    header {

<script>
document.addEventListener("DOMContentLoaded", function() {
    var stack = document.querySelector('.main__container_type_newsfeed');
    var cards = document.querySelectorAll('.card__container');
    
    // Header 높이 분만큼 보정하기 위한 설정 (헤더가 있다면)
    var header = document.querySelector('header');
    if(header && stack) {
        stack.style.height = 'calc(100vh - ' + header.offsetHeight + 'px)';
    }

    var cardArray = Array.from(cards);

    // Z-index 설정: 먼저 선언된 HTML 카드가 맨 위에 올라오도록 역순 지정
    cardArray.forEach(function(card, index) {
        card.style.zIndex = cards.length - index;
    });

    /* ──────────────────────────────────────────────
     ▩ 상단 헤더 탭하면 잠깐 나타났다 사라짐 (2026-07-16 사장님 수정지시 1-1/1-2, 유튜브 쇼츠 참고)
    ────────────────────────────────────────────── */
    var reelHeader = document.getElementById('home-header');
    var headerHideTimer = null;
    function revealHeader() {
        if (!reelHeader) return;
        reelHeader.classList.add('is_revealed');
        clearTimeout(headerHideTimer);
        headerHideTimer = setTimeout(function () {
            reelHeader.classList.remove('is_revealed');
        }, 2600);
    }
    cardArray.forEach(function (card) {
        card.addEventListener('click', function (ev) {
            // 옵션 버튼(좋아요/댓글 등)이나 재생 버튼을 탭했을 때는 헤더를 토글하지 않음
            if (ev.target.closest('.btnbox__card_option') || ev.target.closest('.btnbox__play_video')) return;
            revealHeader();
        });
    });

    // 스와이프 방향 토스트 — transform 있는 카드의 자식이 아니라 body 바로 아래 붙여서
    // position:fixed가 항상 뷰포트 기준으로 동작하도록 함
    var swipeToast = document.createElement('div');
    swipeToast.className = 'swipe__toast';
    document.body.appendChild(swipeToast);

    var swipeToastTimer = null;
    function showSwipeToast(text, type) {
        clearTimeout(swipeToastTimer);
        swipeToast.textContent = text;
        swipeToast.className = 'swipe__toast is_visible ' + type;
        swipeToastTimer = setTimeout(function () {
            swipeToast.classList.remove('is_visible');
        }, 900);
    }

    /* ──────────────────────────────────────────────
     ▩ 인맥 매칭 상태 (데모용 시뮬레이션)
       - 실제 서비스에서는 서버가 신청/수락 상태를 관리하지만, 데모에서는 localStorage로 흉내냅니다.
       - CARD_USERS: 카드 순서(위→아래)대로 영상 주인 정보 지정. 카드 순서를 바꾸면 함께 수정할 것.
       - INCOMING_REQUESTS: "상대가 먼저 나에게 인맥신청해 둔" 유저. 이 유저에게 신청하면 즉시 상호 연결.
       - 데모 초기화: 개발자도구 콘솔에서 localStorage.clear() 실행.
    ────────────────────────────────────────────── */
    var CARD_USERS = [
        { id: 'park_soyeon', name: '박소연',        avatar: './assets/images/sample_avatar_3.png' },
        { id: 'lee_junho',   name: '이준호',        avatar: './assets/images/sample_avatar_2.png' },
        { id: 'park_soyeon', name: '박소연',        avatar: './assets/images/sample_avatar_3.png' }, // 같은 사람의 두 번째 영상
        { id: 'kim_haneul',  name: '김하늘',        avatar: './assets/images/sample_avatar_4.png' },
        { id: 'whitney',     name: 'Whitney Johns', avatar: './assets/images/sample_avatar_1.png' },
        { id: 'whitney',     name: 'Whitney Johns', avatar: './assets/images/sample_avatar_1.png' }  // 같은 사람의 두 번째 영상
    ];

    var INCOMING_REQUESTS = ['lee_junho'];

    function loadState(key) {
        try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch (e) { return []; }
    }
    function saveState(key, value) {
        try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) { /* 저장 불가 시 무시 */ }
    }

    /* ──────────────────────────────────────────────
     ▩ 차단 / 신고 (마이 스위트 > 설정 > 차단 관리에서 조회/해제)
    ────────────────────────────────────────────── */
    function bbmLoadBlocked() {
        try { return JSON.parse(localStorage.getItem('bbm_blockedUsers') || '[]'); } catch (e) { return []; }
    }
    function bbmSaveBlocked(list) {
        try { localStorage.setItem('bbm_blockedUsers', JSON.stringify(list)); } catch (e) { /* 무시 */ }
    }
    function bbmIsBlocked(id) {
        return bbmLoadBlocked().some(function (u) { return u.id === id; });
    }
    function bbmBlockUser(user) {
        var list = bbmLoadBlocked();
        if (!list.some(function (u) { return u.id === user.id; })) {
            list.push({ id: user.id, name: user.name, avatar: user.avatar, blockedAt: Date.now() });
            bbmSaveBlocked(list);
        }
    }

    // 이미 차단한 사용자의 카드는 진입 시점부터 숨김 (추천에서 배제)
    cardArray.forEach(function (card, index) {
        var user = CARD_USERS[index];
        if (user && bbmIsBlocked(user.id)) {
            card.style.display = 'none';
        }
    });

    // 카드의 '신고' 버튼 — 대상 정보를 report.html에 전달
    window.reportCardUser = function (index) {
        var user = CARD_USERS[index];
        if (!user) return;
        var params = new URLSearchParams({
            targetType: 'user',
            targetId: user.id,
            targetName: user.name,
            targetAvatar: user.avatar,
            targetDesc: '영상 게시물에서 신고됨'
        });
        location.href = './report.html?' + params.toString();
    };

    // 카드의 '설정' 버튼 — 차단 확인 후 해당 작성자의 카드를 덱에서 즉시 숨김
    window.blockCardUser = function (index) {
        var user = CARD_USERS[index];
        if (!user) return;
        if (!confirm(user.name + '님을 차단하시겠어요?\n차단하면 서로 추천에 노출되지 않고, 채팅도 더 이상 할 수 없습니다.\n이 설정은 마이 스위트 > 설정 > 차단 관리에서 해제할 수 있습니다.')) return;

        bbmBlockUser(user);

        // 같은 사용자의 모든 카드를 덱에서 숨김
        cardArray.forEach(function (c, i) {
            var u = CARD_USERS[i];
            if (u && u.id === user.id) c.style.display = 'none';
        });

        showSwipeToast(user.name + '님을 차단했습니다', 'dup');
    };

    /* ──────────────────────────────────────────────
     ▩ 홈 우상단 리나 강 바로가기 — 신규 가입자 한시 노출 (기본 5회, 서버 설정값)
    ────────────────────────────────────────────── */
    var RINA_LINK_MAX_VIEWS = 5;
    var rinaLinkViews = parseInt(localStorage.getItem('bbm_homeRinaLinkViews') || '0', 10) + 1;
    try { localStorage.setItem('bbm_homeRinaLinkViews', String(rinaLinkViews)); } catch (e) { /* 무시 */ }

    if (rinaLinkViews <= RINA_LINK_MAX_VIEWS) {
        var rinaLink = document.createElement('div');
        rinaLink.className = 'rina__quick_link';
        rinaLink.innerHTML =
            '<img class="rina__face rina__face_a" src="./assets/images/rina_face_smile_1.png">' +
            '<img class="rina__face rina__face_b" src="./assets/images/rina_face_smile_9.png">';
        rinaLink.onclick = function () { location.href = './chatroom_rina.html'; };
        document.body.appendChild(rinaLink);
    }

    /* ──────────────────────────────────────────────
     ▩ 가입정보 입력 촉구 팝업 (2026-07-16 사장님 수정지시, 누락 화면 16번)
       프로필(관심사/목적 등) 입력을 마치지 않은 사용자에게 한 번 노출 — 데모에서는
       localStorage 플래그로 "한 번만 보여주기"를 흉내냄.
    ────────────────────────────────────────────── */
    var profileNudgeOverlay = document.createElement('div');
    profileNudgeOverlay.className = 'profile__nudge_overlay';
    profileNudgeOverlay.innerHTML =
        '<div class="profile__nudge_card">' +
            '<div class="profile__nudge_icon">✨</div>' +
            '<div class="profile__nudge_title">프로필을 더 채워볼까요?</div>' +
            '<div class="profile__nudge_desc">관심사, 목적 같은 정보를 입력하면<br>나에게 더 잘 맞는 인맥을 추천해드려요.</div>' +
            '<button class="profile__nudge_cta" onclick="location.href=\'./edit_profile.html\';">정보 입력하기</button>' +
            '<div class="profile__nudge_dismiss" id="profile-nudge-dismiss">다음에 할게요</div>' +
        '</div>';
    profileNudgeOverlay.onclick = function (e) {
        if (e.target === profileNudgeOverlay) closeProfileNudge();
    };
    document.body.appendChild(profileNudgeOverlay);

    function closeProfileNudge() {
        profileNudgeOverlay.classList.remove('is_open');
        try { localStorage.setItem('bbm_profileNudgeDismissed', '1'); } catch (e) { /* 무시 */ }
    }
    document.getElementById('profile-nudge-dismiss').onclick = closeProfileNudge;

    if (!localStorage.getItem('bbm_profileNudgeDismissed')) {
        setTimeout(function () {
            profileNudgeOverlay.classList.add('is_open');
        }, 1500);
    }

    /* ──────────────────────────────────────────────
     ▩ 매칭 성공 팝업 (3-1 시안) — 상호 인맥신청 성사 시 노출
    ────────────────────────────────────────────── */
    var matchPopup = document.createElement('div');
    matchPopup.className = 'match__popup';
    matchPopup.innerHTML =
        '<div class="match__popup_logo">BoomBooming</div>' +
        '<div class="match__popup_avatar"><img id="match-popup-avatar" src=""></div>' +
        '<div class="match__popup_name" id="match-popup-name"></div>' +
        '<div class="match__popup_title">인맥이 연결되었어요.</div>' +
        '<div class="match__popup_subtitle">You\'re now connected</div>' +
        '<textarea class="match__popup_input" id="match-popup-input" placeholder="메시지를 입력하세요..."></textarea>' +
        '<button class="match__popup_send" onclick="location.href=\'./chatroom.html\';">메시지 보내기</button>' +
        '<div class="match__popup_close" id="match-popup-close">닫고 계속 보기</div>';
    document.body.appendChild(matchPopup);

    document.getElementById('match-popup-close').onclick = function () {
        matchPopup.classList.remove('is_open'); // 닫으면 다음 영상이 이미 노출된 상태
    };

    function showMatchPopup(user) {
        document.getElementById('match-popup-avatar').src = user.avatar;
        document.getElementById('match-popup-name').textContent = user.name;
        matchPopup.classList.add('is_open');
    }

    // 인맥연결 알림 배너 (푸시 알림 흉내)
    var matchNotification = document.createElement('div');
    matchNotification.className = 'match__notification';
    document.body.appendChild(matchNotification);
    var matchNotificationTimer = null;

    function showMatchNotification(user) {
        clearTimeout(matchNotificationTimer);
        matchNotification.innerHTML =
            '<div class="match__notification_avatar"><img src="' + user.avatar + '"></div>' +
            '<div>🎉 ' + user.name + '님과 인맥이 연결되었습니다</div>';
        matchNotification.classList.add('is_visible');
        matchNotificationTimer = setTimeout(function () {
            matchNotification.classList.remove('is_visible');
        }, 2600);
    }

    /* ──────────────────────────────────────────────
     ▩ 공유 시트 (2026-07-16 사장님 수정지시, 누락 화면 5번)
       "링크 복사"는 실제로 클립보드에 복사되고, 나머지 옵션은 공유 완료 토스트를 보여주는 데모 동작
    ────────────────────────────────────────────── */
    var SHARE_OPTIONS = [
        { key: 'kakao', label: '카카오톡', icon: 'icon_chat_32dp.svg' },
        { key: 'sms', label: '메시지', icon: 'icon_chat_bubble_32dp.svg' },
        { key: 'instagram', label: '인스타그램', icon: 'icon_add_folder_32dp.svg' },
        { key: 'more', label: '다른 앱', icon: 'icon_share_32dp.svg' }
    ];

    var shareSheetOverlay = document.createElement('div');
    shareSheetOverlay.className = 'share__sheet_overlay';
    shareSheetOverlay.innerHTML =
        '<div class="share__sheet">' +
            '<div class="share__handle"></div>' +
            '<div class="share__title">공유하기</div>' +
            '<div class="share__options">' +
                SHARE_OPTIONS.map(function (opt) {
                    return '<div class="share__option" onclick="shareVia(\'' + opt.key + '\', \'' + opt.label + '\')">' +
                        '<div class="share__option_icon"><img src="./assets/images/' + opt.icon + '" width="24" height="24"></div>' +
                        '<div class="share__option_label">' + opt.label + '</div>' +
                    '</div>';
                }).join('') +
            '</div>' +
            '<div class="share__link_row">' +
                '<div class="share__link_text">https://boombooming-mvp.netlify.app/v/8241</div>' +
                '<div class="share__link_copy_btn" onclick="copyShareLink()">복사</div>' +
            '</div>' +
            '<button class="share__cancel_btn" onclick="closeShareSheet()">취소</button>' +
        '</div>';
    shareSheetOverlay.onclick = function (e) {
        if (e.target === shareSheetOverlay) closeShareSheet();
    };
    document.body.appendChild(shareSheetOverlay);

    window.openShareSheet = function () {
        shareSheetOverlay.classList.add('is_open');
    };
    window.closeShareSheet = function () {
        shareSheetOverlay.classList.remove('is_open');
    };
    window.shareVia = function (key, label) {
        closeShareSheet();
        showSwipeToast(label + '(으)로 공유되었습니다', 'like');
    };
    window.copyShareLink = function () {
        var link = 'https://boombooming-mvp.netlify.app/v/8241';
        var done = function () {
            closeShareSheet();
            showSwipeToast('링크가 복사되었습니다', 'like');
        };
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(link).then(done, done);
        } else {
            done();
        }
    };

    /* 영상을 한 개도 올리지 않은 사용자는 인맥신청 불가 (2026-07-16 사장님 수정지시, 누락 화면 1번)
       데모용 값 — 실제로는 서버에서 내 업로드 영상 수를 받아와야 함. 콘솔에서
       localStorage.setItem('bbm_myVideoCount', '1') 후 새로고침하면 정상 신청 플로를 확인할 수 있음. */
    var MY_VIDEO_COUNT = parseInt(localStorage.getItem('bbm_myVideoCount') || '0', 10);

    /* 오른쪽 스와이프(인맥신청) 판정 — 붐부밍 매칭 플로(니콜 강, 2026-07-06) 기준
       1) 최초 신청: "OO님께 인맥신청"
       2) 상대가 이미 나를 신청해 둔 상태(상호 성사): 매칭 성공 팝업 → 곧이어 다음 영상
       3) 같은 상대에게 재신청: "이미 인맥신청 했어요"
       4) 이미 인맥 관계: "OO님과는 이미 인맥 상태에요"
       0) 내가 올린 영상이 0개: "최소 1개의 영상이 있어야 인맥신청이 이루어져요"
       ※ 왼쪽 스와이프는 어떤 경우든 "다음 영상" (상대 상태 정보 노출 금지) */
    function requestMatch(user) {
        if (!user) { showSwipeToast('인맥신청', 'like'); return; }

        if (MY_VIDEO_COUNT < 1) {
            showSwipeToast('최소 1개의 영상이 있어야 인맥신청이 이루어져요', 'dup');
            return;
        }

        var connections = loadState('bbm_connections');
        var myRequests = loadState('bbm_myRequests');

        var isConnected = connections.some(function (c) { return c.id === user.id; });
        if (isConnected) {
            showSwipeToast(user.name + '님과는 이미 인맥 상태에요', 'dup');
            return;
        }

        if (myRequests.indexOf(user.id) > -1) {
            showSwipeToast('이미 인맥신청 했어요', 'dup');
            return;
        }

        if (INCOMING_REQUESTS.indexOf(user.id) > -1) {
            connections.push({ id: user.id, name: user.name, avatar: user.avatar, at: Date.now() });
            saveState('bbm_connections', connections);
            // 매칭 성사 → 풀스크린 팝업 (3-1 시안). 팝업을 닫으면 다음 영상이 이어짐
            showMatchPopup(user);
            return;
        }

        myRequests.push(user.id);
        saveState('bbm_myRequests', myRequests);
        showSwipeToast(user.name + '님께 인맥신청', 'like');
    }

    /* ──────────────────────────────────────────────
     ▩ 스와이프 정책 (2026-07-06 사장님 지시로 좌우만 유지)
       - 오른쪽 (틴더식): 인맥신청 → 다음 영상
       - 왼쪽 (틴더식): 거절("다음 영상") → 다음 영상
       - 상/하 스와이프: 없음 (기능 삭제됨)
    ────────────────────────────────────────────── */
    var SWIPE_THRESHOLD = 120;

    cardArray.forEach(function(card) {
        // Hammer 인스턴스 생성
        var hammer = new Hammer(card);

        // 좌우 방향의 Pan만 인식 (상하 스와이프 기능 삭제)
        hammer.get('pan').set({ direction: Hammer.DIRECTION_HORIZONTAL });

        hammer.on('pan', function(ev) {
            if (!card.classList.contains('moving')) {
                card.classList.add('moving');
            }
            // 틴더처럼 손가락을 따라가며 기울이기
            var rotate = ev.deltaX * 0.05; // 0.05 곱해서 기울기 조정
            card.style.transform = 'translate(' + ev.deltaX + 'px, ' + ev.deltaY + 'px) rotate(' + rotate + 'deg)';
        });

        hammer.on('panend', function(ev) {
            card.classList.remove('moving');

            if (Math.abs(ev.deltaX) >= SWIPE_THRESHOLD) {
                // ── 좌/우: 매칭 결정 ──
                var endX = Math.max(Math.abs(ev.velocityX) * window.innerWidth, window.innerWidth);
                endX = ev.deltaX > 0 ? endX : -endX; // 오른쪽인지 왼쪽인지 방향 결정

                card.style.transform = 'translate(' + endX + 'px, ' + (ev.deltaY + ev.velocityY * 1000) + 'px) rotate(' + (endX * 0.05) + 'deg)';
                card.style.opacity = '0';

                // 오른쪽: 인맥신청(케이스 판정) / 왼쪽: "다음 영상"(거절)
                if (ev.deltaX > 0) {
                    requestMatch(CARD_USERS[cardArray.indexOf(card)]);
                } else {
                    showSwipeToast('다음 영상', 'pass');
                }

                // 결정된 카드는 제거하고 다음 영상 노출
                setTimeout(function() {
                    card.style.display = 'none';
                }, 300);
            } else {
                // 임계값 미달 — 원위치로 스프링백 복귀
                card.style.transform = '';
            }
        });
    });
});
</script>

</body>
</html>
