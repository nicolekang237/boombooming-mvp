<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 변경 - BoomBooming</title>

    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/main.css">

    <style>
        .cp__form_label {
            font-size: 13px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 8px;
        }

        .cp__input {
            width: 100%;
            padding: 13px 14px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #eee;
            font-size: 14px;
            box-sizing: border-box;
            margin-bottom: 6px;
        }

        .cp__group {
            margin-bottom: 20px;
        }

        .cp__hint {
            font-size: 11.5px;
            color: rgba(255, 255, 255, 0.35);
        }

        .cp__error {
            display: none;
            color: var(--color-error);
            font-size: 12px;
            margin-top: 4px;
        }

        .cp__submit_btn {
            width: 100%;
            margin-top: 12px;
            padding: 15px;
            border-radius: 100px;
            border: none;
            background: var(--color-primary-pink-active);
            color: #fff;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="app__container app__bg_dark app__container_type_basic">
    <header class="header header__bg_red header__type_basic">
        <div class="topbar">
            <button class="btn btn__size_medium" onclick="history.back();">
                <img src="./assets/images/icon_arrow_back_32dp.svg" width="32" height="32">
            </button>
            <div class="title__main"><span class="title__main_name">비밀번호 변경</span></div>
            <div class="iconbox__topbar" style="visibility:hidden;"><button class="btn btn__size_medium"></button></div>
        </div>
    </header>

    <main class="main__container main__container_type_basic">
        <div class="main__content_wrapper" style="padding: 20px 16px;">

            <div class="cp__group">
                <div class="cp__form_label">현재 비밀번호</div>
                <input class="cp__input" type="password" id="cpCurrent" placeholder="현재 비밀번호를 입력하세요">
                <div class="cp__error" id="cpCurrentError">현재 비밀번호가 올바르지 않습니다.</div>
            </div>

            <div class="cp__group">
                <div class="cp__form_label">새 비밀번호</div>
                <input class="cp__input" type="password" id="cpNew" placeholder="영문, 숫자 포함 8자 이상">
                <div class="cp__hint">영문과 숫자를 포함해 8자 이상 입력해주세요.</div>
            </div>

            <div class="cp__group">
                <div class="cp__form_label">새 비밀번호 확인</div>
                <input class="cp__input" type="password" id="cpConfirm" placeholder="비밀번호를 다시 입력하세요">
                <div class="cp__error" id="cpMatchError">비밀번호가 일치하지 않습니다.</div>
            </div>

            <button class="cp__submit_btn" onclick="submitPasswordChange();">비밀번호 변경</button>
        </div>
    </main>
</div>

<script>
    // 데모: 현재 비밀번호는 'test1234'로 가정 (실제로는 서버 검증)
    var CP_CURRENT_DEMO_PASSWORD = 'test1234';
    var PASSWORD_MIN_LENGTH = 8;
    var PASSWORD_PATTERN = /^(?=.*[A-Za-z])(?=.*\d).+$/;

    function submitPasswordChange() {
        var current = document.getElementById('cpCurrent').value;
        var next = document.getElementById('cpNew').value;
        var confirm_ = document.getElementById('cpConfirm').value;

        document.getElementById('cpCurrentError').style.display = 'none';
        document.getElementById('cpMatchError').style.display = 'none';

        if (current !== CP_CURRENT_DEMO_PASSWORD) {
            document.getElementById('cpCurrentError').style.display = 'block';
            return;
        }

        if (!next || next.length < PASSWORD_MIN_LENGTH || !PASSWORD_PATTERN.test(next)) {
            alert('새 비밀번호는 영문과 숫자를 포함해 8자 이상이어야 합니다.');
            return;
        }

        if (next !== confirm_) {
            document.getElementById('cpMatchError').style.display = 'block';
            return;
        }

        alert('비밀번호가 변경되었습니다.');
        history.back();
    }
</script>

</body>
</html>
