    <link rel="stylesheet" href="./css/main.css"><!-- Main CSS -->

    <style>
        /*
        ■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■

        ▩ My Channel

        ▩ 공통으로 쓰이는 레이아웃, 헤더, 푸터 등을 제외하고 오직 이 페이지에서만 쓰이는 스타일은 이곳에만 기재.

        ■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■
        */

        /* ■ 페이지 상단의 헤더 영역
        ---------------------------------------------------------------------- */
        .topinfo {
            display: inline-flex;
            align-items: center;
            justify-content: flex-end;
            position: relative;
            width: 100%;
            height: 70px;
            padding: 0 20px 6px 20px;
            background-position: center bottom;
            background-size: 430px;
        }

        .topinfo__inner {
            position: relative;
            width: 100%;
            height: 60px;
            padding: 0 0 0 150px;
            font-size: 20px;
            font-weight: 700;
            line-height: 1.4;
            overflow: hidden;
        }

        .topinfo__inner > span {
            position: absolute;
            bottom: 0;
        }

        .topinfo__subs, .topinfo__posts, .topinfo__text_subs, .topinfo__text_posts {
            text-align: center;
            line-height: 1.15;
        }

        .topinfo__number_subs, .topinfo__number_posts {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -2px;
        }

        .topinfo__number_subs, .topinfo__unit_subs {
            vertical-align: baseline;
        }

        .topinfo__number_subs {
            color: var(--color-accent-gold-light);
        }

        .topinfo__unit_subs {
            font-size: 18px;
            font-weight: 100;
        }

        .topinfo__description {
            width: 100%;
            padding: 18px 20px 34px 20px;
        }

        .topinfo__description > div {
            width: 100%;
            padding: 0 0 0 150px;
            line-height: 1.4;
        }


        /* ■ 메인 컨텐츠 영역
        ---------------------------------------------------------------------- */
        .main__content_container {
            width: 100%;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        /* 메인 컨텐츠의 Header 영역 */
        .main__content_container_header {
            display: inline-flex;
            align-items: center;
            justify-content: space-around;
            width: 100%;
            margin-bottom: 20px;
            padding: 0 14px 0 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .main__content_title {
            padding-bottom: 12px;
            line-height: 1;
        }

        .expand-icon { /* 타이틀 오른쪽의 '펼침 아이콘'' 영역 */
            display: flex;
            line-height: 1;
        }

        .btn__more { /* 타이틀 오른쪽의 '더 보기' 버튼 영역 */
            font-weight: 700;
            color: #35b4ce;
        }

        /* 메인 컨텐츠의 Body 영역 */
        .main__content_container_body {
            width: 100%;
            padding: 0 20px 20px 20px;
        }

        .container__body_type_grid_a {
            display: grid;
            gap: 12px;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            justify-content: start;
        }

        .main__content_vod_thumb { /* 동영상 썸네일 */
            position: relative;
            aspect-ratio: 7 / 13;
            padding: 4px 8px;
            border-radius: 10px;
            background-color: rgba(255, 255, 255, 0.2);
            background-size: cover;
            background-position: center;
        }

        .btn__vod_option { /* 동영상 썸네일 내부의 '옵션' 버튼 */
            position: absolute;
            bottom: 3px;
            right: 3px;
        }

        .btn__vod_rating { /* 동영상 썸네일 내부의 '별점' 버튼 */
            position: absolute;
            bottom: 3px;
            left: 3px;
        }

        .views__vod_thumb { /* 동영상 썸네일 내부의 '동영상 조회수 표시' 영역 */
            display: flex;
            align-items: center;
            gap: 4px;
            text-shadow: 0 0 6px rgba(0, 0, 0, 1);
            font-size: 13px;
        }

        .views__iconbox {
            display: flex;
        }

        /* ■ 더보기 액션시트 — 수정하기 / 삭제하기 */
        .more__sheet_backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.45);
            z-index: 220;
        }

        .more__sheet_backdrop.is_open {
            display: block;
        }

        .more__sheet {
            position: fixed;
            left: 50%;
            bottom: 0;
            transform: translate(-50%, 100%);
            width: 100%;
            max-width: 430px;
            z-index: 221;
            background-color: #1e1e1e;
            border-radius: 16px 16px 0 0;
            padding: 10px 16px 28px;
            transition: transform 0.25s ease-out;
        }

        .more__sheet.is_open {
            transform: translate(-50%, 0);
        }

        .more__sheet_handle {
            width: 36px;
            height: 4px;
            border-radius: 4px;
            background-color: rgba(255, 255, 255, 0.2);
            margin: 6px auto 14px;
        }

        .more__sheet_item {
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 14px 4px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            cursor: pointer;
        }

        .more__sheet_item:last-of-type {
            border-bottom: none;
        }

        .more__sheet_item_title {
            font-size: 15px;
            font-weight: 700;
            color: #ffffff;
        }

        .more__sheet_item.is_danger .more__sheet_item_title {
            color: var(--color-error);
        }

        .more__sheet_item_desc {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.45);
        }

        .more__sheet_cancel {
            margin-top: 12px;
            text-align: center;
            padding: 14px;
            border-radius: 12px;
            background-color: rgba(255, 255, 255, 0.08);
            font-size: 15px;
            font-weight: 700;
            color: #ffffff;
            cursor: pointer;
        }
    </style>
</head>

    </footer>

    <!-- ▣ 더보기 액션시트 — 수정하기 / 삭제하기 -->
    <div class="more__sheet_backdrop" id="moreSheetBackdrop" onclick="closeMoreSheet();"></div>
    <div class="more__sheet" id="moreSheet">
        <div class="more__sheet_handle"></div>

        <div class="more__sheet_item" onclick="editVideo();">
            <div class="more__sheet_item_title">수정하기</div>
            <div class="more__sheet_item_desc">제목, 설명, 해시태그, 공개범위를 수정합니다.</div>
        </div>

        <div class="more__sheet_item" onclick="closeMoreSheet();">
            <div class="more__sheet_item_title">공개범위 변경</div>
            <div class="more__sheet_item_desc">전체공개 / 친구만 / 비공개로 전환합니다.</div>
        </div>

        <div class="more__sheet_item is_danger" onclick="deleteVideo();">
            <div class="more__sheet_item_title">삭제하기</div>
            <div class="more__sheet_item_desc">이 영상을 완전히 삭제합니다. 되돌릴 수 없습니다.</div>
        </div>

        <div class="more__sheet_cancel" onclick="closeMoreSheet();">취소</div>
    </div>
</div>


<!-- ■□■□■ [SCRIPT] 'Javascript' Area -->
<script>
    var activeVideoId = null;

    function openMoreSheet(videoId) {
        activeVideoId = videoId;
        document.getElementById('moreSheetBackdrop').classList.add('is_open');
        document.getElementById('moreSheet').classList.add('is_open');
    }

    function closeMoreSheet() {
        document.getElementById('moreSheetBackdrop').classList.remove('is_open');
        document.getElementById('moreSheet').classList.remove('is_open');
    }

    // 수정하기 — 업로드 상세 화면을 수정 모드로 재사용
    function editVideo() {
        var videoId = activeVideoId;
        closeMoreSheet();
        location.href = './upload_details.html?mode=edit&videoId=' + encodeURIComponent(videoId);
    }

    // 삭제하기 — 확인 후 그리드에서 제거
    function deleteVideo() {
        var videoId = activeVideoId;
        closeMoreSheet();
        if (!confirm('이 영상을 삭제하시겠어요?\n삭제된 영상은 복구할 수 없습니다.')) return;
        var cell = document.querySelector('.main__content_vod_thumb[data-video-id="' + videoId + '"]');
        if (cell) cell.remove();
    }
</script>

</body>
</html>
