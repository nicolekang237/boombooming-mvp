<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoomBooming</title>

    <link rel="stylesheet" href="./css/common.css"><!-- Common CSS -->
    <link rel="stylesheet" href="./css/main.css"><!-- Main CSS -->
</head>
<body>

<!--
▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨

▩ 비밀번호 찾기

▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨▨
-->
<div class="app__container app__bg_white app__container_type_basic">
    <header class="header header__bg_red header__type_basic">
        <div class="topbar">
            <button class="btn btn__size_medium">
                <img src="./assets/images/logo_symbol_white.png" width="40" height="26">
            </button>

            <div class="title__main" style="color: #eee; font-size: 16px;">비밀번호 찾기</div>

            <div class="iconbox__topbar">
                <button class="btn btn__size_medium" onclick="location.href='./chat_directory.html';">
                    <img src="./assets/images/icon_add_folder_32dp.svg" width="30" height="30">
                </button>
            </div>
        </div>
    </header>

    <main class="main__container main__container_type_basic">
        <div class="main__content_wrapper">
            <div class="form__appbar">
                <img src="./assets/images/icon_arrow_back_32dp_dark.svg" width="24" height="24" onclick="history.back();" style="cursor: pointer;">
                <div class="form__appbar_title">비밀번호 찾기</div>
            </div>

            <div class="form__body">
                <div class="form__group">
                    <div class="form__heading">가입하신 이메일로<br>비밀번호를 찾습니다.</div>
                    <div class="form__desc">인증을 완료하시면 새 비밀번호를 설정할 수 있습니다.</div>
                </div>

                <div class="form__group">
                    <label class="form__label">로그인 이메일</label>
                    <div class="form__row">
                        <input class="form__input" type="email" id="fpEmail" placeholder="example@email.com">
                        <button class="form__button_inline" id="fpSendBtn" onclick="sendResetCode()">인증코드 발송</button>
                    </div>
                    <div class="form__desc" id="fpEmailError" style="display:none; color: var(--color-error); margin-top: 6px;">올바른 이메일 형식을 입력해주세요.</div>
                </div>

                <div class="form__group" id="fpCodeGroup" style="opacity: 0.4;">
                    <div style="display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 8px;">
                        <label class="form__label" style="margin-bottom: 0;">인증번호</label>
                        <span class="form__timer" id="fpTimer">05:00</span>
                    </div>
                    <input class="form__input form__input_readonly" type="text" id="fpCodeInput" placeholder="인증번호 6자리 입력" maxlength="6" disabled oninput="updateVerifyButton()">
                    <div class="form__desc" id="fpCodeError" style="display:none; color: var(--color-error); margin-top: 6px;"></div>
                </div>

                <button class="form__button form__button_disabled" id="fpVerifyBtn" disabled onclick="verifyResetCode()">인증 확인</button>
            </div>
        </div>
    </main>

    <footer class="footer footer__type_basic">
        <div class="toolbar">
            <div class="btnbox__toolbar">
                <button class="btn__full" onclick="location.href='./home.html';">
                    <img src="./assets/images/icon_home_32dp.svg" width="28" height="28">
                    <div class="btn__text">홈</div>
                </button>
            </div>

            <div class="btnbox__toolbar">
                <button class="btn__full" onclick="location.href='./chat.html';">
                    <img src="./assets/images/icon_chat_32dp.svg" width="26" height="26" style="margin-top: 2px;">
                    <div class="btn__text">메시지</div>
                </button>
            </div>

            <div class="btnbox__toolbar">
                <button class="btn__full" onclick="location.href='./upload_main.html';">
                    <img src="./assets/images/icon_add_32dp.svg" width="28" height="28">
                    <div class="btn__text">만들기</div>
                </button>
                <div class="btnbox__badge">필수</div>
            </div>

            <div class="btnbox__toolbar">
                <button class="btn__full" onclick="location.href='./booming_index_growth.html';">
                    <img src="./assets/images/icon_mood_up_32dp_white.svg" width="28" height="28">
                    <div class="btn__text">부밍지수</div>
                </button>
            </div>

            <div class="btnbox__toolbar">
                <button class="btn__full" onclick="location.href='./mysuite.html';">
                    <img src="./assets/images/icon_person_32dp.svg" width="29" height="29">
                    <div class="btn__text">마이스위트</div>
                </button>
            </div>
        </div>
    </footer>
</div>

<script>
    var DEMO_CODE = '123456'; // 데모용 고정 인증코드 (실제로는 서버에서 발급)
    var fpTimerHandle = null;
    var fpSecondsLeft = 300;

    function sendResetCode() {
        var email = document.getElementById('fpEmail').value.trim();
        var errorEl = document.getElementById('fpEmailError');
        var emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if (!emailPattern.test(email)) {
            errorEl.style.display = 'block';
            return;
        }
        errorEl.style.display = 'none';

        // 인증번호 입력 영역 활성화
        var codeGroup = document.getElementById('fpCodeGroup');
        var codeInput = document.getElementById('fpCodeInput');
        codeGroup.style.opacity = '1';
        codeInput.disabled = false;
        codeInput.value = '';
        codeInput.focus();

        document.getElementById('fpSendBtn').textContent = '재발송';
        alert('인증코드가 발송되었습니다.\n(데모 환경 안내: 인증번호 ' + DEMO_CODE + ')');

        fpSecondsLeft = 300;
        clearInterval(fpTimerHandle);
        fpTimerHandle = setInterval(function () {
            fpSecondsLeft--;
            var m = String(Math.floor(fpSecondsLeft / 60)).padStart(2, '0');
            var s = String(fpSecondsLeft % 60).padStart(2, '0');
            document.getElementById('fpTimer').textContent = m + ':' + s;
            if (fpSecondsLeft <= 0) {
                clearInterval(fpTimerHandle);
                codeInput.disabled = true;
                codeGroup.style.opacity = '0.4';
                document.getElementById('fpCodeError').textContent = '인증 시간이 만료되었습니다. 다시 발송해주세요.';
                document.getElementById('fpCodeError').style.display = 'block';
                updateVerifyButton();
            }
        }, 1000);

        updateVerifyButton();
    }

    function updateVerifyButton() {
        var codeInput = document.getElementById('fpCodeInput');
        var btn = document.getElementById('fpVerifyBtn');
        var enabled = !codeInput.disabled && codeInput.value.length === 6;
        btn.disabled = !enabled;
        btn.classList.toggle('form__button_disabled', !enabled);
    }

    function verifyResetCode() {
        var codeInput = document.getElementById('fpCodeInput');
        var errorEl = document.getElementById('fpCodeError');

        if (codeInput.value !== DEMO_CODE) {
            errorEl.textContent = '인증번호가 일치하지 않습니다.';
            errorEl.style.display = 'block';
            return;
        }

        clearInterval(fpTimerHandle);
        location.href = './reset_password.html';
    }
</script>

</body>
</html>
